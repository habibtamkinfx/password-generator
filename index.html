<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Password Generator</title>
  </head>
  <body>
    <div class="container">
      <h1>Password Generator</h1>
      <div class="password-container">
        <input type="text" readonly id="password" />
        <i class="far fa-copy" id="copy-btn"></i>
      </div>
      <div class="options">
        <div class="option">
          <label for="range-length">Password Length</label>
          <div class="range-container">
            <input type="range" id="range-length" min="6" max="24" value="12" />
            <span id="range-lable">12</span>
          </div>
          <div class="option">
            <label for="include-uppercase">Include Uppercase</label>
            <input type="checkbox" id="include-uppercase" checked />
          </div>
          <div class="option">
            <label for="include-lowercase">Include Lowercase</label>
            <input type="checkbox" id="include-lowercase" checked />
          </div>
          <div class="option">
            <label for="include-numbers">Include Numbers</label>
            <input type="checkbox" id="include-numbers" checked />
          </div>
          <div class="option">
            <label for="include-symbols">Include Symbols</label>
            <input type="checkbox" id="include-symbols" checked />
          </div>
        </div>
      </div>
      <button id="generate-btn">
        <i class="fas fa-key"></i>
        Generate Pssword
      </button>
      <div class="strength-container">
        <p>Password Strength: <span id="strength-label">Strong</span></p>
        <div class="strength-meter">
          <div class="strength-bar"></div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
